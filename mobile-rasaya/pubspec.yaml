name: RASAYA
description: "RASAYA mobile for students."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  cupertino_icons: ^1.0.8
  image_picker: ^1.0.7
  image_picker_for_web: ^3.0.2
  file_picker: ^8.0.3
  intl: ^0.19.0
  fl_chart: ^0.66.1
  google_fonts: ^6.2.1
  water_drop_nav_bar: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/logo_horizontal.png
    - assets/images/app_icon.png
    - assets/images/logo_vertikal.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#073763"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  remove_alpha_ios: true
